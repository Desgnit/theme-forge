<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" role="img" aria-label="Linear LED batten luminaire">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293f"/><stop offset="1" stop-color="#101828"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0v36" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="rgba(245,158,11,0.16)"/><stop offset="1" stop-color="rgba(245,158,11,0)"/>
    </radialGradient>
  </defs>
  <rect width="600" height="480" fill="url(#bg)"/>
  <rect width="600" height="480" fill="url(#grid)"/>
  <rect width="600" height="480" fill="url(#glow)"/>
  <g transform="translate(100,90)">
    <g stroke="rgba(255,255,255,0.85)" stroke-width="3" fill="none">
      <rect x="52" y="120" width="296" height="46" rx="20"/>
      <rect x="66" y="132" width="268" height="22" rx="11" stroke="#f59e0b" stroke-width="2" fill="rgba(245,158,11,0.14)"/>
      <line x1="120" y1="96" x2="120" y2="118"/><line x1="280" y1="96" x2="280" y2="118"/>
      <rect x="110" y="84" width="20" height="12" rx="3"/><rect x="270" y="84" width="20" height="12" rx="3"/>
    </g>
    <g stroke="#f59e0b" stroke-width="2">
      <line x1="120" y1="182" x2="112" y2="200"/><line x1="200" y1="182" x2="200" y2="202"/><line x1="280" y1="182" x2="288" y2="200"/>
    </g></g>
  <rect x="24" y="24" width="120" height="26" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
  <text x="38" y="41" fill="rgba(255,255,255,0.28)" font-family="monospace" font-size="12">CAL-BATT SERIES</text>
