<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" role="img" aria-label="Recessed LED panel luminaire">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e293f"/><stop offset="1" stop-color="#101828"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0v36" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="rgba(245,158,11,0.16)"/><stop offset="1" stop-color="rgba(245,158,11,0)"/>
    </radialGradient>
  </defs>
  <rect width="600" height="480" fill="url(#bg)"/>
  <rect width="600" height="480" fill="url(#grid)"/>
  <rect width="600" height="480" fill="url(#glow)"/>
  <g transform="translate(100,90)">
    <g stroke="rgba(255,255,255,0.85)" stroke-width="3" fill="none">
      <rect x="80" y="70" width="240" height="160" rx="8"/>
      <rect x="96" y="86" width="208" height="128" rx="4" fill="rgba(245,158,11,0.14)" stroke="#f59e0b" stroke-width="2"/>
    </g>
    <g stroke="rgba(255,255,255,0.28)" stroke-width="1.5">
      <line x1="112" y1="86" x2="112" y2="214"/><line x1="144" y1="86" x2="144" y2="214"/>
      <line x1="176" y1="86" x2="176" y2="214"/><line x1="208" y1="86" x2="208" y2="214"/>
      <line x1="240" y1="86" x2="240" y2="214"/><line x1="272" y1="86" x2="272" y2="214"/>
    </g></g>
  <rect x="24" y="24" width="120" height="26" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
  <text x="38" y="41" fill="rgba(255,255,255,0.28)" font-family="monospace" font-size="12">CAL-PANE SERIES</text>
</svg>