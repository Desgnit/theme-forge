name: Pages bootstrap probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify live site and release
        run: |
          echo "=== hub status: $(curl -s -o /tmp/hub -w '%{http_code}' https://desgnit.github.io/theme-forge/)"
          echo "=== hub demo links: $(grep -o 'href="[a-z-]*/index.html"' /tmp/hub | sort -u | wc -l)"
          grep -o 'href="[a-z-]*/index.html"' /tmp/hub | sort -u
          echo "=== callout status: $(curl -s -o /dev/null -w '%{http_code}' https://desgnit.github.io/theme-forge/callout/index.html)"
          echo "=== release zips: $(curl -s https://api.github.com/repos/Desgnit/theme-forge/releases/tags/themes-latest | python3 -c 'import json,sys; print(len(json.load(sys.stdin)["assets"]))')"
