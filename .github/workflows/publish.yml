name: Publish demos + package theme zips

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write # release uploads
  pages: write
  id-token: write
  issues: write # Etsy token-expiry alerts

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test catalog integrity
        run: python3 tests/test_catalog.py

      - name: Package theme zips
        run: ./marketing/package-zips.sh

      - name: Sync listings to Etsy (skips until shop secrets are set)
        env:
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
          ETSY_REFRESH_TOKEN: ${{ secrets.ETSY_REFRESH_TOKEN }}
          ETSY_SHOP_ID: ${{ secrets.ETSY_SHOP_ID }}
          ETSY_PUBLISH: ${{ secrets.ETSY_PUBLISH }}
        run: |
          pip install -q requests
          python3 marketing/platform/sync-etsy.py
        continue-on-error: true

      - name: Open an issue if the Etsy token expired
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          f=marketing/platform/needs-reauth.txt
          [ -f "$f" ] || exit 0
          title="Action needed: re-run setup wizard (etsy session expired)"
          if [ -z "$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$title in:title" --json number --jq '.[0].number')" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body \
              "The Etsy refresh token has expired, so Etsy listing sync is paused (demos, zips and everything else keep working).

          Fix (5 min): on your computer run \`python3 marketing/platform/setup-wizard.py etsy\`, approve in the browser, done. See marketing/platform/README.md."
          fi
          rm -f "$f"

      - name: Assemble demo site (hub at site root)
        run: ./marketing/build-demos.sh

      - name: Publish theme zips to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: themes-latest
          name: Theme product zips (latest)
          body: >
            Sellable theme packages, rebuilt automatically on every push.
            Upload these zips to your marketplace listings.
          files: marketing/dist/*.zip

      # GITHUB_TOKEN cannot create the Pages site nor edit the github-pages
      # environment branch policy, so deploy via the gh-pages branch instead
      # of upload-pages-artifact/deploy-pages.
      - name: Deploy demo site to gh-pages branch
        run: |
          cd marketing/demo-site
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy demo site for ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit Etsy listing state back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketing/platform/etsy-listings.json marketing/store-links.json 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "Update Etsy listing state [bot]"
            git push origin HEAD:main
          }
