name: Publish demos + package theme zips

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write # release uploads
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble demo site (hub at site root)
        run: ./marketing/build-demos.sh

      - name: Package theme zips
        run: ./marketing/package-zips.sh

      - name: Publish theme zips to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: themes-latest
          name: Theme product zips (latest)
          body: >
            Sellable theme packages, rebuilt automatically on every push.
            Upload these zips to your marketplace listings.
          files: marketing/dist/*.zip

      # GITHUB_TOKEN cannot create the Pages site nor edit the github-pages
      # environment branch policy, so deploy via the gh-pages branch instead
      # of upload-pages-artifact/deploy-pages.
      - name: Deploy demo site to gh-pages branch
        run: |
          cd marketing/demo-site
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy demo site for ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
