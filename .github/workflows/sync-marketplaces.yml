name: Sync listings to marketplaces (RPA)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1" # weekly health check: catches expired sessions early

permissions:
  contents: write # state-file commits
  issues: write # expiry alerts

concurrency:
  group: marketplace-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright
        run: |
          pip install -q playwright
          python -m playwright install --with-deps chromium

      - name: Package theme zips
        run: ./marketing/package-zips.sh

      - name: Test the auto-fill engine and catalog
        run: |
          python3 tests/test_catalog.py
          python3 tests/test_autofill.py

      - name: List on every connected marketplace
        continue-on-error: true
        env:
          GUMROAD_SESSION: ${{ secrets.GUMROAD_SESSION }}
          CREATIVEMARKET_SESSION: ${{ secrets.CREATIVEMARKET_SESSION }}
          THEMEFOREST_SESSION: ${{ secrets.THEMEFOREST_SESSION }}
          PAYHIP_SESSION: ${{ secrets.PAYHIP_SESSION }}
          CODESTER_SESSION: ${{ secrets.CODESTER_SESSION }}
          WRAPBOOTSTRAP_SESSION: ${{ secrets.WRAPBOOTSTRAP_SESSION }}
          TEMPLATEMONSTER_SESSION: ${{ secrets.TEMPLATEMONSTER_SESSION }}
          CREATIVEFABRICA_SESSION: ${{ secrets.CREATIVEFABRICA_SESSION }}
        run: |
          rc=0
          for site in gumroad creativemarket themeforest payhip codester wrapbootstrap templatemonster creativefabrica; do
            python3 marketing/platform/sync-browser.py "$site" || rc=1
          done
          exit $rc

      - name: Upload step screenshots (for diagnosing UI changes)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rpa-screenshots
          path: marketing/platform/shots/
          if-no-files-found: ignore

      - name: Open an issue if any session needs re-auth
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          f=marketing/platform/needs-reauth.txt
          [ -f "$f" ] || exit 0
          sites=$(sort -u "$f" | paste -sd', ' -)
          title="Action needed: re-run setup wizard ($sites session expired)"
          if [ -z "$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$title in:title" --json number --jq '.[0].number')" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body \
              "The stored login session for **$sites** has expired, so automatic listing is paused for that site (everything else keeps working).

          Fix (5 min): on your computer run

          \`\`\`
          python3 marketing/platform/setup-wizard.py ${sites%%,*}
          \`\`\`

          log in when the browser opens, and this issue can be closed. See marketing/platform/README.md."
          fi

      - name: Commit listing state back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketing/platform/*-listings.json 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "Update marketplace listing state [bot]"
            git pull --rebase origin main
            git push origin HEAD:main
          }
